jwt:
  secret: cognitive-profile-jwt-secret-key-must-be-at-least-256-bits-long
  expiration-ms: 86400000

spring:
  ai:
    openai:
      base-url: http://172.16.40.230:18012/v1
      api-key: idata@123456
      timeout: 10m
      max-retries: 0
      chat:
        options:
          model: Qwen3-VL-32B-Instruct
          temperature: 0.7
          max-tokens: 4096

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  application:
    name: cognitive-profile-backend

  # PostgreSQL，对应 docs/init_db.sql 建表脚本
  datasource:
    url: jdbc:postgresql://172.16.40.232:5432/postgres
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # Neo4j（spring-boot-starter-data-neo4j，Bolt协议直连）
  neo4j:
    uri: bolt://172.16.40.232:7687
#    uri: bolt://172.16.40.232:7688
    authentication:
      username: neo4j
      password: neo4jpasswd

  # Redis（缓存层）
  data:
    redis:
      host: 172.16.40.232
      port: 6379

  # Kafka（spring-kafka），topic命名见 infra.kafka.KafkaTopicConstants
  kafka:
    bootstrap-servers: 172.16.40.232:9092
    consumer:
      group-id: cognitive-profile-ingestion
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        max.poll.interval.ms: 1800000
        max.poll.records: 10
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# MyBatis-Plus配置，下划线转驼峰是全局约定（见 docs/01-CODEGEN-CONTEXT.md 第0节）
mybatis-plus:
  type-handlers-package: com.idata.profile.infra.mybatis
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_uuid

# Milvus连接信息（io.milvus:milvus-sdk-java，需在 infra.milvus 包内补充客户端Bean配置）
milvus:
  uri: http://172.16.40.232:19530
  host: 172.16.40.232
  port: 19530

# MinIO（io.minio:minio客户端）
minio:
  endpoint: http://172.16.40.232:9000
  access-key: minioadmin
  secret-key: minioadmin

# Elasticsearch
elasticsearch:
  uris: http://172.16.40.232:9200
  username: elastic
  password: elastic

server:
  port: 8080

logging:
  level:
    com.idata.profile: info
#  file:
#    name: logs/cognitive-profile-backend.log

llm:
  embedding:
    base-url: http://172.16.40.232:18013/v1
    api-key: idata@123456
    model: Qwen3-VL-Embedding-8B
    text-concurrency: 1
    image-concurrency: 1
    timeout-seconds: 60
    max-retries: 2
    retry-backoff-ms: 500
  reranker:
    base-url: http://172.16.40.232:18014/v1
    api-key: idata@123456
    model: Qwen3-VL-Reranker-8B
  asr:
    base-url: http://172.16.40.232:18015/v1
    api-key: idata@123456
    model: Qwen3-ASR-1.7B

media:
  caption:
    enabled: true
    timeout-seconds: 300
    max-tokens: 256
  processing:
    ffmpeg-path: D:/ffmpeg-7.0/bin/ffmpeg.exe
    ffprobe-path: D:/ffmpeg-7.0/bin/ffprobe.exe
    segment-seconds: 30
    max-segments: 20
    process-timeout-seconds: 180
