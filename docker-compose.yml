services:

  # ============================================================
  # 课题四后端服务
  # ============================================================
  cognitive-profile-backend:
    image: cognitive-profile-backend:latest
    container_name: cognitive-profile
    #    network_mode: host          # 共享宿主机网络，直接访问 172.16.40.232 各服务
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - 5555:8080
    volumes:
      - ./application.yml:/app/application.yml
      # 日志持久化（可选）
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s